set -g base-index 1

setw -g pane-base-index 1

set -g renumber-windows on
set -g default-shell /bin/zsh

set-option -g prefix C-a
unbind C-a
bind C-a send-prefix

set -g mouse on
set-option -g default-terminal "xterm-256color"

bind n new-window


set-option -g status on

bind -n C-l send-keys C-l

# Use Alt+arrow keys to switch panes
bind -n M-j select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Use Alt+Shift+arrow keys to resize panes
bind -n M-S-j resize-pane -L 2
bind -n M-S-l resize-pane -R 2
bind -n M-S-k resize-pane -U 2
bind -n M-S-j resize-pane -D 2

set-option -g status-style "fg=#5c4a3d,bg=#f2e5bc"

set-window-option -g window-status-style "fg=#a89984,bg=default"

set-window-option -g window-status-current-style "fg=#c14a4a,bg=#ebdbb2,bold"

set-option -g pane-border-style "fg=#d5c4a1"
set-option -g pane-active-border-style "fg=#6c782e"

set-option -g message-style "fg=#f2e5bc,bg=#5c4a3d"

set-option -g display-panes-active-colour "#6c782e"
set-option -g display-panes-colour "#b47109"

set-window-option -g clock-mode-colour "#45707a"

set-window-option -g mode-style "fg=#5c4a3d,bg=#ebdbb2"

set-window-option -g window-status-bell-style "fg=#f2e5bc,bg=#c14a4a"
